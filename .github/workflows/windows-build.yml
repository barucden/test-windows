name: Windows build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache ORT
        id: cache-ort
        uses: actions/cache@v5
        with:
          path: thirdparty/ort/install
          key: ${{ runner.os }}-ort-${{ hashFiles('thirdparty/ort/CMakeLists.txt', 'thirtparty/ort/patches/*') }}

      - name: Build ORT
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          cmake -S thirdparty/ort/ -B thirdparty/ort/build/
          cmake --build thirdparty/ort/build

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROJECT_VERSION=${{ github.ref_name }}

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix build/install

      - name: Package
        run: |
          cd build
          cpack -C Release

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/install

